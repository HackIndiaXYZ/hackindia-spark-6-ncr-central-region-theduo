<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Bill - ScanBill</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= DESIGN SYSTEM ================= */
:root{
  --bg:#F8FBFF;
  --white:#FFFFFF;
  --primary:#60A5FA;
  --primary2:#8B8CFF;
  --indigo:#A5B4FC;
  --lav:#DDD6FE;

  --text:#334155;
  --muted:#64748B;
  --border:#E2E8F0;

  --shadow:0 10px 30px rgba(100,130,180,0.12);
  --hover-shadow:0 16px 35px rgba(100,130,180,0.16);

  --radius:20px;
}

/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Inter",sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ================= LAYOUT ================= */
.page{
  max-width:1300px;
  margin:auto;
  padding:32px 40px;
}

.grid{
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  gap:24px;
}

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.title h1{
  font-size:28px;
  font-weight:800;
}
.title p{
  font-size:14px;
  color:var(--muted);
}

.btn{
  padding:12px 18px;
  border-radius:14px;
  font-weight:600;
  font-size:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:pointer;
  transition:0.25s;
}

.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:#fff;
  box-shadow:var(--shadow);
}
.btn-primary:hover{transform:translateY(-2px);}

.btn-secondary{
  background:#fff;
  border:1px solid var(--border);
}

/* ================= BILL TYPE ================= */
.bill-type{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:24px;
}

.bill-card{
  padding:20px;
  border-radius:18px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:0.3s;
}

.bill-card.active{
  border:2px solid var(--primary);
  background:linear-gradient(135deg,#EFF6FF,#F5F3FF);
}

.bill-card h3{font-size:16px;margin-bottom:6px;}
.bill-card p{font-size:13px;color:var(--muted);}

/* ================= SEARCH ================= */
.search{
  margin-bottom:20px;
}

.search input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
}

/* ================= PRODUCTS ================= */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.product{
  background:#fff;
  padding:18px;
  border-radius:18px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:170px;
  transition:0.3s;
}

.product:hover{
  transform:translateY(-4px);
  box-shadow:var(--hover-shadow);
}

.product.selected{
  border:2px solid var(--primary);
}

.product h4{font-size:15px;}
.product span{font-size:13px;color:var(--muted);}

/* ================= STEPPER ================= */
.stepper{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:10px;
}

.stepper button{
  width:30px;height:30px;
  border-radius:8px;
  background:#EEF4FF;
}

.qty{
  font-weight:600;
}

/* ================= SUMMARY ================= */
.summary{
  position:sticky;
  top:20px;
  background:#fff;
  padding:24px;
  border-radius:20px;
  border:1px solid var(--border);
  height:fit-content;
}

.summary h3{
  margin-bottom:16px;
}

.items{
  margin-bottom:16px;
}

.item{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:6px;
}

.total{
  font-size:20px;
  font-weight:800;
  margin-top:10px;
}

/* ================= ACTIONS ================= */
.actions{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:16px;
}

/* ================= FOOTER ================= */
.footer{
  margin-top:40px;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<div class="page">

<!-- HEADER -->
<div class="header">
  <div class="title">
    <h1>Create Bill</h1>
    <p>Select items and generate a smart payment bill</p>
  </div>

  <a href="seller-dashboard.html" class="btn btn-secondary">Back</a>
</div>

<div class="grid">

<!-- LEFT -->
<div>

<!-- BILL TYPE -->
<div class="bill-type">
  <div class="bill-card active" onclick="setType('customer')">
    <h3>Customer Bill</h3>
    <p>Used for selling items</p>
  </div>

  <div class="bill-card" onclick="setType('stock')">
    <h3>Stock Bill</h3>
    <p>Used for purchasing stock</p>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input placeholder="Search items...">
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

</div>

<!-- RIGHT SUMMARY -->
<div class="summary">

<h3>Bill Summary</h3>

<div id="summaryItems"></div>

<div class="total" id="total">₹0</div>

<div class="actions">
  <a href="qr-page.html" class="btn btn-primary">Generate Smart QR</a>
  <button class="btn btn-secondary" onclick="clearBill()">Clear Bill</button>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
Smart billing powered by ScanBill • Hackathon 2026
</div>

</div>

<script>

const data = [
  {name:"Maggi",price:20},
  {name:"Coke",price:40},
  {name:"Milk",price:25},
  {name:"Bread",price:35},
  {name:"Chips",price:30},
  {name:"Biscuit",price:10}
];

let cart={};

const container=document.getElementById("products");

data.forEach(item=>{
  const div=document.createElement("div");
  div.className="product";

  div.innerHTML=`
    <h4>${item.name}</h4>
    <span>₹${item.price}</span>
    <div class="stepper">
      <button onclick="update('${item.name}',-1)">-</button>
      <div class="qty" id="${item.name}">0</div>
      <button onclick="update('${item.name}',1)">+</button>
    </div>
  `;

  container.appendChild(div);
});

function update(name,change){
  cart[name]=(cart[name]||0)+change;
  if(cart[name]<0) cart[name]=0;

  document.getElementById(name).innerText=cart[name];

  renderSummary();
}

function renderSummary(){
  let total=0;
  const summary=document.getElementById("summaryItems");
  summary.innerHTML="";

  for(let key in cart){
    if(cart[key]>0){
      let price=data.find(x=>x.name==key).price;
      total+=price*cart[key];

      summary.innerHTML+=`
        <div class="item">
          <span>${key} x${cart[key]}</span>
          <span>₹${price*cart[key]}</span>
        </div>
      `;
    }
  }

  document.getElementById("total").innerText="₹"+total;
}

function clearBill(){
  cart={};
  document.querySelectorAll(".qty").forEach(q=>q.innerText=0);
  renderSummary();
}

function setType(type){
  document.querySelectorAll(".bill-card").forEach(c=>c.classList.remove("active"));
  event.currentTarget.classList.add("active");
}

</script>

</body>
</html>
